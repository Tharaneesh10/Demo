name: Deploy Chatbot to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd convai-chatbot
          npm install

      - name: Build React App
        run: |
          cd convai-chatbot
          npm run build

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Upload Build Files to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r \
          convai-chatbot/dist/* \
          ubuntu@16.16.204.18:/home/ubuntu/chatbot-build/

      - name: Deploy to Nginx
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@16.16.204.18 << 'EOF'

          sudo mkdir -p /var/www/html

          sudo rm -rf /var/www/html/*

          sudo cp -r /home/ubuntu/chatbot-build/* /var/www/html/

          sudo systemctl restart nginx

          echo "Deployment Successful"

          EOF
